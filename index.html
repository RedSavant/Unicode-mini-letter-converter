<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyni Unicode Converter</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 24px 16px;
    }

    h1 {
      color: #ff8c00;
      margin: 0 0 1rem 0;
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2rem);
    }

    input, textarea, button {
      width: min(500px, 100%);
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      border-radius: 8px;
      border: none;
      font-size: clamp(0.95rem, 3.5vw, 1rem);
      outline: none;
    }

    input, textarea {
      background: #1e1e1e;
      color: #fff;
      resize: none;
    }

    textarea {
      min-height: 120px;
    }

    button {
      background: #ff8c00;
      color: #121212;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      touch-action: manipulation;
    }

    button:hover {
      background: #ffa733;
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      padding: 0 12px;
      font-size: 0.8rem;
      color: #888;
    }

    @media (max-height: 520px) {
      footer {
        position: static;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>Mini Unicode Converter</h1>
  <input type="text" id="inputText" placeholder="Enter your text here">
  <button onclick="convert()">Convertir</button>
  <textarea id="outputText" readonly placeholder="Result..."></textarea>

  <footer>Made by RedSavant</footer>

  <script>
    const smallCapsMap = {
      a: 'ᴀ', b: 'ʙ', c: 'ᴄ', d: 'ᴅ', e: 'ᴇ', f: 'ꜰ', g: 'ɢ',
      h: 'ʜ', i: 'ɪ', j: 'ᴊ', k: 'ᴋ', l: 'ʟ', m: 'ᴍ', n: 'ɴ',
      o: 'ᴏ', p: 'ᴘ', q: 'ǫ', r: 'ʀ', s: 'ꜱ', t: 'ᴛ', u: 'ᴜ',
      v: 'ᴠ', w: 'ᴡ', x: 'x', y: 'ʏ', z: 'ᴢ',
      A: 'ᴀ', B: 'ʙ', C: 'ᴄ', D: 'ᴅ', E: 'ᴇ', F: 'ꜰ', G: 'ɢ',
      H: 'ʜ', I: 'ɪ', J: 'ᴊ', K: 'ᴋ', L: 'ʟ', M: 'ᴍ', N: 'ɴ',
      O: 'ᴏ', P: 'ᴘ', Q: 'ǫ', R: 'ʀ', S: 'ꜱ', T: 'ᴛ', U: 'ᴜ',
      V: 'ᴠ', W: 'ᴡ', X: 'x', Y: 'ʏ', Z: 'ᴢ'
    };

    function convertText(text) {
      let result = '';
      for (let char of text) {
        result += smallCapsMap[char] || char;
      }
      return result;
    }

    function convert() {
      const text = document.getElementById('inputText').value;
      document.getElementById('outputText').value = convertText(text);
    }

    const params = new URLSearchParams(window.location.search);
    const apiText = params.get("text");

    if (apiText) {
      const converted = convertText(apiText);
      document.getElementById('inputText').value = apiText;
      document.getElementById('outputText').value = converted;
      document.body.innerHTML = `<pre style="color:white;font-size:1.5rem">${converted}</pre>`;
    }
  </script>
</body>
</html>
