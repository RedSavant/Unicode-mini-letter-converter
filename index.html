<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Unicode mini-letter converter</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(255,255,255,.06);
      --text: #e9eefc;
      --muted: rgba(233,238,252,.75);
      --border: rgba(255,255,255,.14);
      --accent: #7aa7ff;

      --radius: 16px;
      --shadow: 0 12px 40px rgba(0,0,0,.35);

      --space-1: 8px;
      --space-2: 12px;
      --space-3: 16px;
      --space-4: 22px;
      --space-5: 28px;
      --max: 920px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f7ff;
        --card: rgba(10,20,40,.04);
        --text: #0b1020;
        --muted: rgba(11,16,32,.70);
        --border: rgba(10,20,40,.16);
        --accent: #2f63ff;
        --shadow: 0 10px 30px rgba(20,30,60,.15);
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 15% 0%, rgba(122,167,255,.25), transparent 55%),
                  radial-gradient(900px 500px at 85% 15%, rgba(110,231,183,.18), transparent 60%),
                  var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 40px);
    }

    .app {
      width: min(var(--max), 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: clamp(16px, 3.2vw, 26px);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: clamp(18px, 2.8vw, 24px);
      letter-spacing: .2px;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      padding: clamp(16px, 3.2vw, 26px);
      display: grid;
      gap: var(--space-4);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .field {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.14);
      color: var(--text);
      outline: none;
      font-size: 16px;
    }

    @media (prefers-color-scheme: light) {
      textarea { background: rgba(255,255,255,.75); }
    }

    textarea:focus {
      border-color: rgba(122,167,255,.6);
      box-shadow: 0 0 0 4px rgba(122,167,255,.15);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(122,167,255,.14);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 650;
      cursor: pointer;
      min-height: 44px; /* confort tactile */
    }

    button.primary {
      background: rgba(122,167,255,.25);
      border-color: rgba(122,167,255,.35);
    }

    button:active { transform: translateY(1px); }
    button:hover { border-color: rgba(122,167,255,.55); }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    footer {
      padding: 14px clamp(16px, 3.2vw, 26px);
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12.5px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="app" role="application" aria-label="Unicode mini-letter converter">
      <header>
        <div>
          <h1>Unicode mini-letter converter</h1>
          <p>Convertit du texte en “mini-lettres” (ex: <span class="mono">A → ᴀ</span>)</p>
        </div>
        <p class="hint">Responsive • Accessible • 100% HTML</p>
      </header>

      <main>
        <div class="grid">
          <section class="field">
            <label for="input">Texte à convertir</label>
            <textarea id="input" placeholder="Tape ton texte ici…"></textarea>
            <div class="actions">
              <button class="primary" id="convert">Convertir</button>
              <button id="clear">Effacer</button>
            </div>
            <p class="hint">Astuce: la taille 16px évite le zoom automatique sur iPhone.</p>
          </section>

          <section class="field">
            <label for="output">Résultat</label>
            <textarea id="output" readonly placeholder="Le résultat apparaîtra ici…"></textarea>
            <div class="actions">
              <button class="primary" id="copy">Copier</button>
            </div>
            <p class="hint">Le bouton “Copier” utilise l’API Clipboard (si disponible).</p>
          </section>
        </div>
      </main>

      <footer>
        <span>Repo: <span class="mono">RedSavant/Unicode-mini-letter-converter</span></span>
        <span class="mono" id="status" aria-live="polite"></span>
      </footer>
    </div>
  </div>

  <script>
    
    const map = new Map([
      ["A", "ᴀ"],
      ["a", "ᴀ"]
    ]);

    const $ = (id) => document.getElementById(id);
    const input = $("input");
    const output = $("output");
    const status = $("status");

    function convertText(text) {
      return [...text].map(ch => map.get(ch) ?? ch).join("");
    }

    $("convert").addEventListener("click", () => {
      output.value = convertText(input.value);
      status.textContent = "Converti.";
      setTimeout(() => status.textContent = "", 1200);
    });

    $("clear").addEventListener("click", () => {
      input.value = "";
      output.value = "";
      input.focus();
      status.textContent = "Effacé.";
      setTimeout(() => status.textContent = "", 1200);
    });

    $("copy").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        status.textContent = "Copié dans le presse-papiers.";
      } catch (e) {
        
        output.focus();
        output.select();
        status.textContent = "Sélectionné (copie manuelle).";
      } finally {
        setTimeout(() => status.textContent = "", 1500);
      }
    });
  </script>
</body>
</html>
