<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyni Unicode Converter</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 24px 16px;
    }

    h1 {
      color: #ff8c00;
      margin: 0 0 1rem 0;
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2rem);
    }

    input, textarea, button {
      width: min(500px, 100%);
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      border-radius: 8px;
      border: none;
      font-size: clamp(0.95rem, 3.5vw, 1rem);
      outline: none;
    }

    input, textarea {
      background: #1e1e1e;
      color: #fff;
      resize: none;
    }

    textarea {
      min-height: 120px;
    }

    button {
      background: #ff8c00;
      color: #121212;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      touch-action: manipulation;
    }

    button:hover {
      background: #ffa733;
    }

    .toggles {
      width: min(500px, 100%);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0.25rem 0;
    }

    .tog {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e1e1e;
      border: 1.5px solid #2e2e2e;
      border-radius: 999px;
      padding: 6px 14px 6px 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s;
      touch-action: manipulation;
      font-size: clamp(0.78rem, 2.8vw, 0.85rem);
      color: #aaa;
      white-space: nowrap;
    }

    .tog:hover {
      border-color: #ff8c00;
      background: #242424;
    }

    .tog.active {
      border-color: #ff8c00;
      color: #ff8c00;
    }

    .pill {
      width: 32px;
      height: 18px;
      border-radius: 999px;
      background: #3a3a3a;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .tog.active .pill {
      background: #ff8c00;
    }

    .pill::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }

    .tog.active .pill::after {
      transform: translateX(14px);
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      padding: 0 12px;
      font-size: 0.8rem;
      color: #888;
    }

    @media (max-height: 520px) {
      footer {
        position: static;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>Mini Unicode Converter</h1>
  <input type="text" id="inputText" placeholder="Enter your text here">

  <div class="toggles">
    <div class="tog active" id="tog-legacy"      onclick="toggle('legacy')">     <span class="pill"></span>legacy §x color code</div>
    <div class="tog"        id="tog-amplegacy"   onclick="toggle('amplegacy')">  <span class="pill"></span>&amp;x color code</div>
    <div class="tog"        id="tog-hex6"        onclick="toggle('hex6')">       <span class="pill"></span>&amp;#rrggbb</div>
    <div class="tog"        id="tog-minimsg"     onclick="toggle('minimsg')">    <span class="pill"></span>MiniMessage</div>
    <div class="tog"        id="tog-json"        onclick="toggle('json')">       <span class="pill"></span>JSON color</div>
    <div class="tog"        id="tog-hexsect"     onclick="toggle('hexsect')">    <span class="pill"></span>§x§r§r§g§g§b§b</div>
    <div class="tog"        id="tog-hexamp"      onclick="toggle('hexamp')">     <span class="pill"></span>&amp;x&amp;r&amp;r&amp;g&amp;g&amp;b&amp;b</div>
    <div class="tog"        id="tog-hexbracket"  onclick="toggle('hexbracket')"> <span class="pill"></span>&lt;#rrggbb&gt;</div>
  </div>

  <button onclick="convert()">Convertir</button>
  <textarea id="outputText" readonly placeholder="Result..."></textarea>

  <footer>Made by RedSavant</footer>

  <script>
    const modes = {
      legacy:     true,
      amplegacy:  false,
      hex6:       false,
      minimsg:    false,
      json:       false,
      hexsect:    false,
      hexamp:     false,
      hexbracket: false
    };

    function toggle(key) {
      modes[key] = !modes[key];
      document.getElementById('tog-' + key).classList.toggle('active', modes[key]);
    }

    const smallCapsMap = {
      a:'ᴀ',b:'ʙ',c:'ᴄ',d:'ᴅ',e:'ᴇ',f:'ꜰ',g:'ɢ',h:'ʜ',i:'ɪ',j:'ᴊ',k:'ᴋ',l:'ʟ',m:'ᴍ',n:'ɴ',
      o:'ᴏ',p:'ᴘ',q:'ǫ',r:'ʀ',s:'ꜱ',t:'ᴛ',u:'ᴜ',v:'ᴠ',w:'ᴡ',x:'x',y:'ʏ',z:'ᴢ',
      A:'ᴀ',B:'ʙ',C:'ᴄ',D:'ᴅ',E:'ᴇ',F:'ꜰ',G:'ɢ',H:'ʜ',I:'ɪ',J:'ᴊ',K:'ᴋ',L:'ʟ',M:'ᴍ',N:'ɴ',
      O:'ᴏ',P:'ᴘ',Q:'ǫ',R:'ʀ',S:'ꜱ',T:'ᴛ',U:'ᴜ',V:'ᴠ',W:'ᴡ',X:'x',Y:'ʏ',Z:'ᴢ'
    };

    const MC_CODES  = new Set('0123456789abcdefklmnorABCDEFKLMNOR');
    const HEX_CHARS = new Set('0123456789abcdefABCDEF');

    function isHex(c) { return HEX_CHARS.has(c); }

    function convertText(text) {
      let result = '';
      let i = 0;
      while (i < text.length) {
        const c = text[i];

        // §x§r§r§g§g§b§b
        if (modes.hexsect && c === '§' && text[i+1] === 'x') {
          let ok = true;
          for (let k = 0; k < 6; k++) {
            const off = 2 + k * 2;
            if (text[i+off] !== '§' || !isHex(text[i+off+1])) { ok = false; break; }
          }
          if (ok) { result += text.slice(i, i+14); i += 14; continue; }
        }

        // &x&r&r&g&g&b&b
        if (modes.hexamp && c === '&' && text[i+1] === 'x') {
          let ok = true;
          for (let k = 0; k < 6; k++) {
            const off = 2 + k * 2;
            if (text[i+off] !== '&' || !isHex(text[i+off+1])) { ok = false; break; }
          }
          if (ok) { result += text.slice(i, i+14); i += 14; continue; }
        }

        // legacy §x
        if (modes.legacy && c === '§' && i+1 < text.length && MC_CODES.has(text[i+1])) {
          result += c + text[i+1]; i += 2; continue;
        }

        // &x legacy
        if (modes.amplegacy && c === '&' && i+1 < text.length && MC_CODES.has(text[i+1])) {
          result += c + text[i+1]; i += 2; continue;
        }

        // &#rrggbb
        if (modes.hex6 && c === '&' && text[i+1] === '#') {
          let j = i+2, hex = '';
          while (hex.length < 6 && j < text.length && isHex(text[j])) { hex += text[j]; j++; }
          if (hex.length === 6) { result += text.slice(i, j); i = j; continue; }
        }

        // <#rrggbb>
        if (modes.hexbracket && c === '<' && text[i+1] === '#') {
          let j = i+2, hex = '';
          while (hex.length < 6 && j < text.length && isHex(text[j])) { hex += text[j]; j++; }
          if (hex.length === 6 && text[j] === '>') { result += text.slice(i, j+1); i = j+1; continue; }
        }

        // MiniMessage <tag>
        if (modes.minimsg && c === '<') {
          const end = text.indexOf('>', i+1);
          if (end !== -1 && end - i <= 64) { result += text.slice(i, end+1); i = end+1; continue; }
        }

        // JSON "color":"..."
        if (modes.json && c === '"') {
          const keyMatch = text.slice(i).match(/^"color"\s*:\s*"([^"]*)"/i);
          if (keyMatch) { result += text.slice(i, i + keyMatch[0].length); i += keyMatch[0].length; continue; }
          const hexStr = text.slice(i).match(/^"#[0-9a-fA-F]{6}"/);
          if (hexStr) { result += hexStr[0]; i += hexStr[0].length; continue; }
        }

        result += smallCapsMap[c] || c;
        i++;
      }
      return result;
    }

    function convert() {
      const text = document.getElementById('inputText').value;
      document.getElementById('outputText').value = convertText(text);
    }

    // API mode (?text=...)
    const params  = new URLSearchParams(window.location.search);
    const apiText = params.get('text');
    if (apiText) {
      const converted = convertText(apiText);
      document.getElementById('inputText').value  = apiText;
      document.getElementById('outputText').value = converted;
      document.body.innerHTML = `<pre style="color:white;font-size:1.5rem">${converted}</pre>`;
    }
  </script>
</body>
</html>
